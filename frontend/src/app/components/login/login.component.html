<div class="login-page">
  <div class="login-card-wrapper fade-in">
    <mat-card class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="logo-wrapper">
          <mat-icon class="logo-icon">payments</mat-icon>
        </div>
        <h1 class="welcome-title">Bem-vindo</h1>
        <p class="welcome-subtitle">Faça login no sistema FolhaPag</p>
      </div>

      <!-- Form -->
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>E-mail</mat-label>
            <input matInput formControlName="email" type="email" placeholder="seu@email.com">
            <mat-icon matSuffix>email</mat-icon>
            <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
              E-mail obrigatório
            </mat-error>
            <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
              E-mail inválido
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Senha</mat-label>
            <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
              Senha obrigatória
            </mat-error>
          </mat-form-field>

          <button mat-raised-button color="primary" type="submit" class="full-width login-button" 
                  [disabled]="loading || loginForm.invalid">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">Entrar</span>
          </button>
        </form>
      </mat-card-content>

      <!-- Development Quick Login -->
      <div class="dev-section" *ngIf="isDevelopment">
        <mat-divider></mat-divider>
        <div class="dev-title">
          <mat-icon color="accent">build</mat-icon>
          <span>Ambiente de Desenvolvimento</span>
        </div>
        
        <div class="dev-buttons">
          <button mat-stroked-button color="primary" (click)="quickLogin('Admin')">
            <mat-icon>admin_panel_settings</mat-icon>
            Admin
          </button>
          <button mat-stroked-button color="accent" (click)="quickLogin('RH')">
            <mat-icon>people</mat-icon>
            RH
          </button>
          <button mat-stroked-button (click)="quickLogin('Employee')">
            <mat-icon>person</mat-icon>
            Employee
          </button>
        </div>
      </div>
    </mat-card>
  </div>
</div>
